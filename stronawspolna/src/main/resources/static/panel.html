<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Administratora</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
        .section { margin-bottom: 40px; padding: 20px; border: 1px solid #aaa; }
    </style>
</head>
<body>
    <h1>Panel Administratora</h1>
    <button onclick="logout()">Wyloguj</button>

    <div class="section">
        <h2>Zarządzanie Użytkownikami</h2>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nazwa Użytkownika</th>
                    <th>Obecna Rola</th>
                    <th>Zmień Rolę</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Zarządzanie Pracownikami (Fryzjerami)</h2>
        <table id="fryzjerzyTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Imię</th>
                    <th>Nazwisko</th>
                    <th>Specjalizacja</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Dodaj nowego fryzjera</h3>
        <input type="text" id="newImie" placeholder="Imię">
        <input type="text" id="newNazwisko" placeholder="Nazwisko">
        <input type="text" id="newSpec" placeholder="Specjalizacja">
        <button onclick="addFryzjer()">Dodaj</button>
    </div>

    <script>
        async function loadUsers() {
            const res = await fetch('/api/admin/users', {credentials: 'include'});
            if (!res.ok) { alert('Brak uprawnień lub błąd!'); return; }
            const users = await res.json();
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.rola}</td>
                    <td>
                        <select onchange="changeRole(${u.id}, this.value)">
                            <option value="">Wybierz...</option>
                            <option value="KLIENT">KLIENT</option>
                            <option value="PRACOWNIK">PRACOWNIK</option>
                            <option value="ADMINISTRATOR">ADMINISTRATOR</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function changeRole(id, newRole) {
            if (!newRole) return;
            const res = await fetch(`/api/admin/users/${id}/role`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({rola: newRole})
            });
            if (res.ok) {
                alert('Zmieniono rolę');
                loadUsers();
            }
        }

        async function loadFryzjerzy() {
            const res = await fetch('/api/admin/fryzjerzy', {credentials: 'include'});
            if (!res.ok) return;
            const data = await res.json();
            const tbody = document.querySelector('#fryzjerzyTable tbody');
            tbody.innerHTML = '';
            data.forEach(f => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${f.id}</td>
                    <td>${f.imie}</td>
                    <td>${f.nazwisko}</td>
                    <td>${f.specjalizacja}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addFryzjer() {
            const imie = document.getElementById('newImie').value;
            const nazwisko = document.getElementById('newNazwisko').value;
            const spec = document.getElementById('newSpec').value;
            
            const res = await fetch('/api/admin/fryzjerzy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({imie, nazwisko, specjalizacja: spec})
            });

            if (res.ok) {
                alert('Dodano fryzjera');
                loadFryzjerzy();
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', {method: 'POST', credentials: 'include'});
            window.location.href = '/login.html';
        }

        window.onload = () => {
            loadUsers();
            loadFryzjerzy();
        };
    </script>
</body>
</html>
