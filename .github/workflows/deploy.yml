name: Deploy to Server

on:
  push:
    branches: [ "master" ]

jobs:
  build_and_push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower case owner and repo names
        run: |
          echo "IMAGE_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_REPO=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Używamy GHCR_TOKEN zamiast GITHUB_TOKEN dla pewności uprawnień w prywatnym repo
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push Web (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}-site:latest

      - name: Build and Push Fryzjer Backend
        uses: docker/build-push-action@v5
        with:
          context: ./stronawspolna
          file: ./stronawspolna/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}:latest

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SSH_USERNAME }}/"

      - name: Connect to server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | sudo docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            
            cd /home/${{ secrets.SSH_USERNAME }}
            
            # Usuń potencjalne konflikty i zresetuj wszystko razem (z OnTheSpotted)
            sudo docker rm -f fryzjer_app pbutune_site fryzjer_db spotted_app spotted_db || true
            
            # Uruchom wszystko z użyciem pliku .env, który jest już na serwerze
            sudo docker compose --env-file .env pull
            sudo docker compose --env-file .env up -d --force-recreate --remove-orphans
            
            sudo docker image prune -f
