<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBU-TUNE | Mechanika Pojazdowa</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .mechanika-hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('img/mechanic-bg.jpg');
            /* Need to ensure this exists or use placeholder */
            background-size: cover;
            background-position: center;
        }

        .mechanika-content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            color: #fff;
            margin-bottom: 20px;
        }

        .mechanika-content p {
            font-size: 1.5rem;
            color: #ccc;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #ff4d4d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #e60000;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
    <div class="mechanika-hero">
        <div class="mechanika-content">
            <h1>MECHANIKA <span class="highlight">POJAZDOWA</span></h1>
            <p>Strona w przygotowaniu. Zapraszamy wkrótce!</p>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Powrót do Portalu</a>
        </div>
    </div>
</body>

</html>
