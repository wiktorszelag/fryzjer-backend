<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustaw wizytę - Zakład Fryzjerski</title>
</head>
<body>
    <h1>Ustaw Wizytę</h1>
    <nav>
        <a href="index.html">Strona główna</a> |
        <a href="klienci.html">Klienci</a> |
        <a href="fryzjerzy.html">Fryzjerzy</a> |
        <a href="uslugi.html">Usługi</a> |
        <a href="wizyty.html">Wizyty</a> |
        <a href="rezerwacja.html">Ustaw wizytę</a>
    </nav>
    <hr>
    <h2>Nowa wizyta</h2>
    <form id="formRezerwacja">
        <label>Klient: <select id="klientId" required></select></label><br><br>
        <label>Fryzjer: <select id="fryzjerId" required></select></label><br><br>
        <label>Data i godzina: <input type="datetime-local" id="dataGodzina" required></label><br><br>
        <label>Czas trwania (min): <input type="number" id="czasTrwania" value="30" required></label><br><br>
        <fieldset>
            <legend>Wybierz usługi:</legend>
            <div id="uslugiCheckboxes"></div>
        </fieldset>
        <br>
        <button type="submit">Ustaw wizytę</button>
    </form>
    <div id="message"></div>
    <hr>
    <h2>Sprawdź dostępność fryzjera</h2>
    <label>Fryzjer: <select id="checkFryzjer"></select></label>
    <label>Data: <input type="date" id="checkData"></label>
    <button onclick="sprawdzDostepnosc()">Sprawdź</button>
    <div id="dostepnosc"></div>
    <script>
        const API = 'http://localhost:8080/api';

        async function loadKlienci() {
            const res = await fetch(API + '/klienci');
            const data = await res.json();
            let options = '<option value="">Wybierz klienta...</option>';
            data.forEach(k => {
                options += '<option value="' + k.klientId + '">' + k.imie + ' ' + k.nazwisko + '</option>';
            });
            document.getElementById('klientId').innerHTML = options;
        }

        async function loadFryzjerzy() {
            const res = await fetch(API + '/fryzjerzy');
            const data = await res.json();
            let options = '<option value="">Wybierz fryzjera...</option>';
            data.forEach(f => {
                options += '<option value="' + f.fryzjerId + '">' + f.imie + ' ' + f.nazwisko + ' (' + f.specjalizacja + ')</option>';
            });
            document.getElementById('fryzjerId').innerHTML = options;
            document.getElementById('checkFryzjer').innerHTML = options;
        }

        async function loadUslugi() {
            const res = await fetch(API + '/uslugi');
            const data = await res.json();
            let html = '';
            data.forEach(u => {
                const brutto = (u.cenaNetto * (1 + u.stawkaVat/100)).toFixed(2);
                html += '<label><input type="checkbox" name="uslugi" value="' + u.uslugaId + '" data-czas="' + u.czasTrwaniaMin + '"> ';
                html += u.nazwa + ' (' + brutto + ' zł, ' + u.czasTrwaniaMin + ' min)</label><br>';
            });
            document.getElementById('uslugiCheckboxes').innerHTML = html;

            document.querySelectorAll('input[name="uslugi"]').forEach(cb => {
                cb.addEventListener('change', updateCzas);
            });
        }

        function updateCzas() {
            let totalCzas = 0;
            document.querySelectorAll('input[name="uslugi"]:checked').forEach(cb => {
                totalCzas += parseInt(cb.dataset.czas);
            });
            if (totalCzas > 0) {
                document.getElementById('czasTrwania').value = totalCzas;
            }
        }

        document.getElementById('formRezerwacja').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const uslugiIds = [];
            document.querySelectorAll('input[name="uslugi"]:checked').forEach(cb => {
                uslugiIds.push(parseInt(cb.value));
            });

            const wizyta = {
                klientId: parseInt(document.getElementById('klientId').value),
                fryzjerId: parseInt(document.getElementById('fryzjerId').value),
                dataGodzinaRozpoczecia: document.getElementById('dataGodzina').value,
                czasTrwaniaCalkowity: parseInt(document.getElementById('czasTrwania').value),
                uslugiIds: uslugiIds
            };

            const res = await fetch(API + '/wizyty', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(wizyta)
            });

            if (res.ok) {
                document.getElementById('message').innerHTML = '<p>Wizyta ustawiona pomyślnie!</p>';
                document.getElementById('formRezerwacja').reset();
            } else {
                document.getElementById('message').innerHTML = '<p>Błąd podczas ustawiania wizyty!</p>';
            }
        });

        async function sprawdzDostepnosc() {
            const fryzjerId = document.getElementById('checkFryzjer').value;
            const data = document.getElementById('checkData').value;
            
            if (!fryzjerId || !data) {
                alert('Wybierz fryzjera i datę');
                return;
            }

            const start = data + 'T08:00:00';
            const end = data + 'T20:00:00';
            
            const res = await fetch(API + '/wizyty/fryzjer/' + fryzjerId + '/zakres?start=' + start + '&end=' + end);
            const wizyty = await res.json();

            let html = '<h4>Zajęte terminy:</h4>';
            if (wizyty.length === 0) {
                html += '<p>Brak wizyt - cały dzień wolny!</p>';
            } else {
                html += '<ul>';
                wizyty.forEach(w => {
                    const godzina = w.dataGodzinaRozpoczecia.split('T')[1].substring(0,5);
                    html += '<li>' + godzina + ' (' + w.czasTrwaniaCalkowity + ' min)</li>';
                });
                html += '</ul>';
            }
            document.getElementById('dostepnosc').innerHTML = html;
        }

        loadKlienci();
        loadFryzjerzy();
        loadUslugi();
    </script>
</body>
</html>
