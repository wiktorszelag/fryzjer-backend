<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <title>Panel Główny - Kalendarz</title>
    <link rel="stylesheet" href="style.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        /* Wymuś jasny motyw FullCalendar */
        .fc { background: white !important; color: #333 !important; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #ddd !important; }
        .fc-theme-standard .fc-scrollgrid { border-color: #ddd !important; }
        .fc-col-header-cell { background: #f8f9fa !important; color: #333 !important; }
        .fc-timegrid-slot { background: white !important; }
        .fc-day-today { background: rgba(255, 220, 40, 0.15) !important; }
        .fc-button { background-color: #343a40 !important; border-color: #343a40 !important; color: white !important; }
        .fc-button:hover { background-color: #23272b !important; }
        .fc-button-primary:not(:disabled).fc-button-active { background-color: #ffc107 !important; border-color: #ffc107 !important; color: #333 !important; }
        .fc-toolbar-title { color: #333 !important; }
        .fc-timegrid-slot-label { color: #666 !important; }

        /* Nav dashboard – flex zamiast center */
        nav { display: flex !important; align-items: center; flex-wrap: wrap; gap: 4px; text-align: left; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        #userInfo { color: #adb5bd; font-size: 14px; margin: 0 15px; }
        #btnWyloguj { background: #dc3545 !important; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; width: auto; margin: 0 10px; }
        #btnWyloguj:hover { background: #c82333 !important; }
    </style>
</head>
<body>

<nav>
    <b>Start</b>
    <a href="uslugi.html">Usługi</a>
    <a href="fryzjerzy.html">Fryzjerzy</a>
    <a href="klienci.html">Klienci</a>
    <a href="wizyty.html">Wizyty</a>
    <div class="nav-right">
        <span id="userInfo"></span>
        <button id="btnWyloguj" onclick="wyloguj()">Wyloguj</button>
    </div>
</nav>

<div class="container" style="max-width: 1200px;"><h1>Kalendarz Wizyt</h1>

    <div style="margin-bottom: 15px;">
        <label for="fryzjerFilter">Filtruj wg fryzjera:</label>
        <select id="fryzjerFilter" style="max-width: 300px; display: inline-block;">
            <option value="all">Wszyscy</option>
        </select>
    </div>

    <div id='calendar'></div>
</div>

<script src="js/api.js"></script>
<script>
    // ── Ochrona strony – sprawdź sesję ────────────────────────────────────────
    (async () => {
        try {
            const res = await fetch('/api/auth/me', { credentials: 'include' });
            if (!res.ok) {
                window.location.href = '/login.html';
                return;
            }
            const data = await res.json();
            const info = document.getElementById('userInfo');
            if (info) info.textContent = `👤 ${data.username} (${data.rola})`;
        } catch (_) {
            window.location.href = '/login.html';
        }
    })();

    // ── Wylogowanie ───────────────────────────────────────────────────────────
    async function wyloguj() {
        try {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
        } catch (_) {}
        window.location.href = '/login.html';
    }
</script>
<script src="js/index.js"></script>
</body>
</html>
