<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Klienci - Zarządzanie</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="dashboard.html">Start</a>
        <a href="uslugi.html">Usługi</a>
        <a href="fryzjerzy.html">Fryzjerzy</a>
        <b>Klienci</b>
        <a href="wizyty.html">Wizyty</a>
        <span id="nav-username" style="color:#ffc107; margin: 0 15px; font-size:15px;"></span>
        <a href="#" onclick="wyloguj()" style="color:#ff6b6b;">&#128274; Wyloguj</a>
    </nav>

    <div class="container">
        <h1>Baza Klientów</h1>

        <div class="panel-dodawania">
            <h3 id="form-naglowek">Dodaj nowego klienta</h3>
            <form id="form-klient">
                <input type="hidden" id="klientId">

                <label>Imię:</label>
                <input type="text" id="imie" required placeholder="np. Jan">

                <label>Nazwisko:</label>
                <input type="text" id="nazwisko" required placeholder="np. Kowalski">

                <label>Telefon:</label>
                <input type="tel" id="telefon" required placeholder="np. 500-600-700">

                <div style="margin-top: 15px;">
                    <button type="submit" id="btn-zapisz">Zapisz Klienta</button>
                    <button type="button" id="btn-anuluj" style="background-color: #6c757d; display: none;">Anuluj
                        edycję</button>
                </div>
            </form>
        </div>

        <hr>

        <h3>Lista Klientów</h3>
        <table class="content-table">
            <thead>
                <tr>
                    <th>Imię i Nazwisko</th>
                    <th>Telefon</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody id="tabela-klientow">
            </tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/klienci.js"></script>
    <script>sprawdzSesje();</script>
</body>

</html>
