<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizyty - Zakład Fryzjerski</title>
</head>
<body>
    <h1>Kalendarz Wizyt</h1>
    <nav>
        <a href="index.html">Strona główna</a> |
        <a href="klienci.html">Klienci</a> |
        <a href="fryzjerzy.html">Fryzjerzy</a> |
        <a href="uslugi.html">Usługi</a> |
        <a href="wizyty.html">Wizyty</a> |
        <a href="rezerwacja.html">Ustaw wizytę</a>
    </nav>
    <hr>
    <h2>Widok tygodniowy</h2>
    <div>
        <button onclick="poprzedniTydzien()">&lt;&lt; Poprzedni tydzień</button>
        <span id="zakresDate" style="margin: 0 20px; font-weight: bold;"></span>
        <button onclick="nastepnyTydzien()">Następny tydzień &gt;&gt;</button>
    </div>
    <br>
    <label>Filtruj po fryzjerze: <select id="filterFryzjer" onchange="loadKalendarz()"><option value="">Wszyscy</option></select></label>
    <br><br>
    <table border="1" width="100%" id="kalendarz">
        <thead>
            <tr>
                <th width="10%">Godzina</th>
                <th>Poniedziałek<br><span id="dzien0"></span></th>
                <th>Wtorek<br><span id="dzien1"></span></th>
                <th>Środa<br><span id="dzien2"></span></th>
                <th>Czwartek<br><span id="dzien3"></span></th>
                <th>Piątek<br><span id="dzien4"></span></th>
                <th>Sobota<br><span id="dzien5"></span></th>
                <th>Niedziela<br><span id="dzien6"></span></th>
            </tr>
        </thead>
        <tbody id="kalendarzBody"></tbody>
    </table>
    <hr>
    <h2>Lista wszystkich wizyt</h2>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Klient</th>
                <th>Fryzjer</th>
                <th>Data i godzina</th>
                <th>Czas trwania</th>
                <th>Usługi</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody id="wizytyTable"></tbody>
    </table>
    <script>
        const API = 'http://localhost:8080/api';
        let klienci = [];
        let fryzjerzy = [];
        let uslugi = [];
        let currentWeekStart = getMonday(new Date());

        function getMonday(d) {
            d = new Date(d);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDate(d) {
            return d.toISOString().split('T')[0];
        }

        function formatDatePL(d) {
            return d.getDate().toString().padStart(2, '0') + '.' + 
                   (d.getMonth() + 1).toString().padStart(2, '0');
        }

        function poprzedniTydzien() {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            loadKalendarz();
        }

        function nastepnyTydzien() {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            loadKalendarz();
        }

        async function loadData() {
            const [kRes, fRes, uRes] = await Promise.all([
                fetch(API + '/klienci'),
                fetch(API + '/fryzjerzy'),
                fetch(API + '/uslugi')
            ]);
            klienci = await kRes.json();
            fryzjerzy = await fRes.json();
            uslugi = await uRes.json();

            let fOptions = '<option value="">Wszyscy</option>';
            fryzjerzy.forEach(f => {
                fOptions += '<option value="' + f.fryzjerId + '">' + f.imie + ' ' + f.nazwisko + '</option>';
            });
            document.getElementById('filterFryzjer').innerHTML = fOptions;
        }

        function getKlientName(id) {
            const k = klienci.find(x => x.klientId === id);
            return k ? k.imie + ' ' + k.nazwisko : '-';
        }

        function getFryzjerName(id) {
            const f = fryzjerzy.find(x => x.fryzjerId === id);
            return f ? f.imie + ' ' + f.nazwisko : '-';
        }

        function getUslugaName(id) {
            const u = uslugi.find(x => x.uslugaId === id);
            return u ? u.nazwa : '-';
        }

        async function loadKalendarz() {
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            document.getElementById('zakresDate').textContent = 
                formatDatePL(currentWeekStart) + ' - ' + formatDatePL(weekEnd) + '.' + weekEnd.getFullYear();

            for (let i = 0; i < 7; i++) {
                const d = new Date(currentWeekStart);
                d.setDate(d.getDate() + i);
                document.getElementById('dzien' + i).textContent = formatDatePL(d);
            }

            const fryzjerId = document.getElementById('filterFryzjer').value;
            let wizyty = [];
            
            if (fryzjerId) {
                const start = formatDate(currentWeekStart) + 'T00:00:00';
                const endDate = new Date(currentWeekStart);
                endDate.setDate(endDate.getDate() + 7);
                const end = formatDate(endDate) + 'T00:00:00';
                const res = await fetch(API + '/wizyty/fryzjer/' + fryzjerId + '/zakres?start=' + start + '&end=' + end);
                wizyty = await res.json();
            } else {
                const res = await fetch(API + '/wizyty');
                const wszystkie = await res.json();
                wizyty = wszystkie.filter(w => {
                    const wizytaDate = new Date(w.dataGodzinaRozpoczecia);
                    const endDate = new Date(currentWeekStart);
                    endDate.setDate(endDate.getDate() + 7);
                    return wizytaDate >= currentWeekStart && wizytaDate < endDate;
                });
            }

            let html = '';
            for (let hour = 8; hour <= 19; hour++) {
                html += '<tr>';
                html += '<td>' + hour.toString().padStart(2, '0') + ':00</td>';
                
                for (let day = 0; day < 7; day++) {
                    const cellDate = new Date(currentWeekStart);
                    cellDate.setDate(cellDate.getDate() + day);
                    const cellDateStr = formatDate(cellDate);
                    
                    const wizytyInCell = wizyty.filter(w => {
                        const wDate = w.dataGodzinaRozpoczecia.split('T')[0];
                        const wHour = parseInt(w.dataGodzinaRozpoczecia.split('T')[1].split(':')[0]);
                        return wDate === cellDateStr && wHour === hour;
                    });
                    
                    html += '<td>';
                    wizytyInCell.forEach(w => {
                        const godzina = w.dataGodzinaRozpoczecia.split('T')[1].substring(0, 5);
                        html += '<div style="background: #e0e0e0; padding: 2px; margin: 2px; font-size: 12px;">';
                        html += '<b>' + godzina + '</b><br>';
                        html += getKlientName(w.klientId) + '<br>';
                        html += '<i>' + getFryzjerName(w.fryzjerId) + '</i><br>';
                        html += '(' + w.czasTrwaniaCalkowity + ' min)';
                        html += '</div>';
                    });
                    html += '</td>';
                }
                html += '</tr>';
            }
            document.getElementById('kalendarzBody').innerHTML = html;
        }

        async function loadWizyty() {
            const res = await fetch(API + '/wizyty');
            const data = await res.json();
            
            let html = '';
            data.forEach(w => {
                const uslugiNames = w.uslugiIds ? w.uslugiIds.map(id => getUslugaName(id)).join(', ') : '-';
                html += '<tr>';
                html += '<td>' + w.wizytaId + '</td>';
                html += '<td>' + getKlientName(w.klientId) + '</td>';
                html += '<td>' + getFryzjerName(w.fryzjerId) + '</td>';
                html += '<td>' + (w.dataGodzinaRozpoczecia ? w.dataGodzinaRozpoczecia.replace('T', ' ') : '-') + '</td>';
                html += '<td>' + (w.czasTrwaniaCalkowity || '-') + ' min</td>';
                html += '<td>' + uslugiNames + '</td>';
                html += '<td><button onclick="deleteWizyta(' + w.wizytaId + ')">Usuń</button></td>';
                html += '</tr>';
            });
            document.getElementById('wizytyTable').innerHTML = html;
        }

        async function deleteWizyta(id) {
            if (confirm('Czy na pewno usunąć wizytę?')) {
                await fetch(API + '/wizyty/' + id, {method: 'DELETE'});
                loadKalendarz();
                loadWizyty();
            }
        }

        loadData().then(() => {
            loadKalendarz();
            loadWizyty();
        });
    </script>
</body>
</html>
