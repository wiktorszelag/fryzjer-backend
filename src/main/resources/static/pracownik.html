<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Pracownika - Punkt Cięcia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #d4af37;
            --bg-dark: #0f0f12;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            backdrop-filter: blur(10px);
        }

        .sidebar h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 3rem;
            text-align: center;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            text-decoration: none;
            color: #ccc;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--glass);
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 20px;
        }

        input, button {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin-right: 10px;
        }
        button {
            background: var(--primary);
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>PUNKT CIĘCIA</h2>
        <a href="pracownik.html" class="nav-item active">✂️ Panel Pracownika</a>
        <a href="panel.html" class="nav-item">📅 Terminarz</a>
        <div style="margin-top: auto;">
            <a href="index.html" class="nav-item" onclick="logout(event)">🚪 Wyloguj</a>
        </div>
    </div>

    <div class="main-content">
        <h1>Panel Pracownika</h1>

        <div class="card">
            <h2>Twoje zaplanowane wizyty</h2>
            
            <div style="margin-top: 15px; display: flex; align-items: center; gap: 10px;">
                <label for="visitDateFilter" style="font-weight: 600; color: var(--primary);">Filtruj dzień:</label>
                <input type="date" id="visitDateFilter" style="margin-right: 0;">
            </div>

            <div style="overflow-x: auto; margin-top: 15px;">
                <table style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--primary);">Godzina</th>
                            <th style="border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--primary);">Klient (lub z ulicy)</th>
                            <th style="border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--primary);">Telefon</th>
                            <th style="border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--primary);">Usługa</th>
                            <th style="border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--primary);">Czas</th>
                            <th style="border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--primary);">Koszt</th>
                        </tr>
                    </thead>
                    <tbody id="myAppointmentsTable">
                        <tr><td colspan="6" style="padding: 10px; text-align: center; color: #888;">Ładowanie wizyt...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Dodaj rezerwację z ulicy (Walk-in)</h2>
            <div style="margin-top:15px; display:flex; flex-direction: column; gap:12px; max-width: 500px;">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="wName" placeholder="Imię klienta" style="flex:1;">
                    <input type="datetime-local" id="wTime" style="flex:1;">
                </div>
                <div style="display:flex; gap:10px; align-items: center;">
                    <select id="wService" style="flex:1; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 5px; outline:none;">
                        <option value="">-- Wybierz usługę --</option>
                    </select>
                    <div id="walkInSummary" style="font-size: 0.9rem; color: var(--primary); font-weight: bold; min-width: 150px;">
                        Czas: - | Cena: -
                    </div>
                </div>
                <button onclick="addWalkIn()" style="align-self: flex-start; padding: 10px 25px;">Zapisz rezerwację</button>
            </div>
        </div>

        <div class="card">
            <h2>Zgłoś urlop</h2>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <input type="date" id="uOd">
                <input type="date" id="uDo">
                <button onclick="addUrlop()">Zgłoś</button>
            </div>
        </div>
    </div>

    <script>
        let currentFryzjer = null;
        let services = [];
        let rawWizyty = [];
        let kMap = {};

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if(!token) {
                window.location.href = 'login.html';
                return;
            }

            // Set default date filter to today
            const filterInput = document.getElementById('visitDateFilter');
            filterInput.value = new Date().toISOString().slice(0, 10);
            filterInput.addEventListener('change', renderWizyty);

            try {
                // 1. Pobierz profil fryzjera
                const meRes = await fetch('/api/fryzjerzy/me', {
                    headers: {'Authorization': 'Bearer ' + token},
                    credentials: 'include'
                });
                if(!meRes.ok) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }
                currentFryzjer = await meRes.json();
                
                document.querySelector('h1').innerText = `Panel Pracownika - ${currentFryzjer.imie} ${currentFryzjer.nazwisko || ''}`;

                // 2. Pobierz usługi
                const sRes = await fetch('/api/uslugi');
                services = await sRes.json();
                populateWalkInServices();

                // 3. Pobierz klientów
                const kRes = await fetch('/api/klienci', {
                     headers: {'Authorization': 'Bearer ' + token}
                 });
                const klienci = await kRes.json();
                klienci.forEach(k => {
                    kMap[k.id] = {
                        name: `${k.imie} ${k.nazwisko || ''}`,
                        phone: k.telefon || '-'
                    };
                });

                // 4. Pobierz wizyty
                loadWizyty();
            } catch(e) {
                console.error(e);
            }
        });

        function populateWalkInServices() {
            const select = document.getElementById('wService');
            select.innerHTML = '<option value="">-- Wybierz usługę --</option>';
            services.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.dataset.duration = s.czasTrwaniaMin;
                opt.dataset.price = s.cenaNetto;
                opt.innerText = `${s.nazwa} (${s.cenaNetto.toFixed(2)} zł)`;
                select.appendChild(opt);
            });

            select.addEventListener('change', function() {
                const opt = this.options[this.selectedIndex];
                const summary = document.getElementById('walkInSummary');
                if (opt && opt.value) {
                    summary.innerText = `Czas: ${opt.dataset.duration} min | Cena: ${parseFloat(opt.dataset.price).toFixed(2)} zł`;
                } else {
                    summary.innerText = `Czas: - | Cena: -`;
                }
            });
        }

        async function loadWizyty() {
            if(!currentFryzjer) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/wizyty/fryzjer/${currentFryzjer.id}`, {
                    headers: {'Authorization': 'Bearer ' + token},
                    credentials: 'include'
                });
                rawWizyty = await res.json();
                renderWizyty();
            } catch(e) {
                console.error(e);
            }
        }

        function renderWizyty() {
            const tbody = document.getElementById('myAppointmentsTable');
            tbody.innerHTML = '';

            const filterDate = document.getElementById('visitDateFilter').value;
            if (!filterDate) {
                tbody.innerHTML = `<tr><td colspan="6" style="padding: 10px; text-align: center; color: #888;">Wybierz datę, aby zobaczyć wizyty.</td></tr>`;
                return;
            }

            // Filter visits for the selected date
            const filtered = rawWizyty.filter(w => w.dataGodzinaRozpoczecia.slice(0, 10) === filterDate);

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="padding: 10px; text-align: center; color: #888;">Brak zaplanowanych wizyt w tym dniu.</td></tr>`;
                return;
            }

            // Sort chronologically by start time
            filtered.sort((a,b) => new Date(a.dataGodzinaRozpoczecia) - new Date(b.dataGodzinaRozpoczecia));

            filtered.forEach(w => {
                const tr = document.createElement('tr');
                const d = new Date(w.dataGodzinaRozpoczecia);
                const timeStr = d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
                
                // Match client info
                let klientName = '-';
                let klientPhone = '-';
                if (w.imieKlientaZUlicy) {
                    klientName = w.imieKlientaZUlicy;
                } else if (w.klientId && kMap[w.klientId]) {
                    klientName = kMap[w.klientId].name;
                    klientPhone = kMap[w.klientId].phone;
                }

                // Match service by duration (rough estimate if not saved) or parse walk-in service
                let serviceName = 'Usługa';
                let price = '-';
                
                // Find matching service
                const matchedService = services.find(s => s.czasTrwaniaMin === w.czasTrwaniaCalkowity);
                if (matchedService) {
                    serviceName = matchedService.nazwa;
                    price = `${matchedService.cenaNetto.toFixed(2)} zł`;
                }

                tr.innerHTML = `
                    <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px; font-weight: bold; color: var(--primary);">${timeStr}</td>
                    <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px;">${klientName}</td>
                    <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px; color: #ccc;">${klientPhone}</td>
                    <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px; color: #ccc;">${serviceName}</td>
                    <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px; color: #aaa;">${w.czasTrwaniaCalkowity} min</td>
                    <td style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px; font-weight: bold; color: var(--primary);">${price}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addWalkIn() {
            const imie = document.getElementById('wName').value;
            const czas = document.getElementById('wTime').value;
            const serviceSelect = document.getElementById('wService');
            const serviceId = serviceSelect.value;
            
            if(!imie || !czas || !serviceId) return alert('Wypełnij wszystkie pola formularza rezerwacji!');
            
            const selectedOpt = serviceSelect.options[serviceSelect.selectedIndex];
            const duration = parseInt(selectedOpt.dataset.duration);
            const serviceName = selectedOpt.text;

            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/wizyty', {
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + token
                    },
                    credentials: 'include', 
                    body: JSON.stringify({
                        imieKlientaZUlicy: `${imie} (Ulica - ${serviceName})`, 
                        dataGodzinaRozpoczecia: czas, 
                        czasTrwaniaCalkowity: duration,
                        fryzjerId: currentFryzjer.id
                    })
                });

                if (res.ok) {
                    alert('Rezerwacja z ulicy dodana pomyślnie!');
                    document.getElementById('wName').value = '';
                    document.getElementById('wTime').value = '';
                    serviceSelect.value = '';
                    document.getElementById('walkInSummary').innerText = `Czas: - | Cena: -`;
                    loadWizyty();
                } else {
                    alert('Wystąpił błąd podczas dodawania rezerwacji.');
                }
            } catch(e) {
                console.error(e);
                alert('Błąd połączenia z serwerem.');
            }
        }

        async function addUrlop() {
            const od = document.getElementById('uOd').value;
            const doD = document.getElementById('uDo').value;
            if(!od || !doD) return alert('Wypełnij daty');
            const token = localStorage.getItem('token');
            await fetch('/api/urlopy', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                credentials: 'include', body: JSON.stringify({fryzjerId: currentFryzjer.id, dataOd: od, dataDo: doD})
            });
            document.getElementById('uOd').value = '';
            document.getElementById('uDo').value = '';
            alert('Urlop został zgłoszony.');
        }

        async function logout(e) {
            e.preventDefault();
            const token = localStorage.getItem('token');
            await fetch('/api/auth/logout', {method: 'POST', headers: {'Authorization': 'Bearer ' + token}, credentials: 'include'});
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
