name: Deploy to Server

on:
  push:
    branches: [ "master" ]

jobs:
  build_and_push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Web (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/wiktorszelag/pbutune-web:latest

      - name: Build and Push Fryzjer Backend
        uses: docker/build-push-action@v5
        with:
          context: ./stronawspolna
          file: ./stronawspolna/Dockerfile
          push: true
          tags: ghcr.io/wiktorszelag/fryzjer-backend:latest

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SSH_USERNAME }}/"

      - name: Connect to server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | sudo docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            
            cd /home/${{ secrets.SSH_USERNAME }}
            
            # Stop and remove potential conflicting containers
            sudo docker rm -f fryzjer_app pbutune_site fryzjer_db || true
            
            # Pull new images and start
            sudo docker compose pull
            sudo docker compose up -d --force-recreate --remove-orphans
            
            # Clean up space
            sudo docker image prune -f
