<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Klienci - Zarządzanie</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #userInfo { color: #adb5bd; font-size: 14px; margin: 0 15px; }
        #btnWyloguj { background: #dc3545; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; width: auto; margin: 0; }
        #btnWyloguj:hover { background: #c82333; }
        nav { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    </style>
</head>

<body>

    <nav>
        <a href="dashboard.html">Start</a>
        <a href="uslugi.html">Usługi</a>
        <a href="fryzjerzy.html">Fryzjerzy</a>
        <b>Klienci</b>
        <a href="wizyty.html">Wizyty</a>
        <div class="nav-right">
            <span id="userInfo"></span>
            <button id="btnWyloguj" onclick="wyloguj()">Wyloguj</button>
        </div>
    </nav>

    <div class="container">
        <h1>Baza Klientów</h1>

        <div class="panel-dodawania">
            <h3 id="form-naglowek">Dodaj nowego klienta</h3>
            <form id="form-klient">
                <input type="hidden" id="klientId">

                <label>Imię:</label>
                <input type="text" id="imie" required placeholder="np. Jan">

                <label>Nazwisko:</label>
                <input type="text" id="nazwisko" required placeholder="np. Kowalski">

                <label>Telefon:</label>
                <input type="tel" id="telefon" required placeholder="np. 500-600-700">

                <div style="margin-top: 15px;">
                    <button type="submit" id="btn-zapisz">Zapisz Klienta</button>
                    <button type="button" id="btn-anuluj" style="background-color: #6c757d; display: none;">Anuluj
                        edycję</button>
                </div>
            </form>
        </div>

        <hr>

        <h3>Lista Klientów</h3>
        <table class="content-table">
            <thead>
                <tr>
                    <th>Imię i Nazwisko</th>
                    <th>Telefon</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody id="tabela-klientow">
            </tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        (async () => {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const info = document.getElementById('userInfo');
                if (info) info.textContent = `👤 ${data.username} (${data.rola})`;
            } catch (_) { window.location.href = '/login.html'; }
        })();
        async function wyloguj() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (_) {}
            window.location.href = '/login.html';
        }
    </script>
    <script src="js/klienci.js"></script>
</body>

</html>
