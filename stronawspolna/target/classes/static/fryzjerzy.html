<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Fryzjerzy - Zespół</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #userInfo { color: #adb5bd; font-size: 14px; margin: 0 15px; }
        #btnWyloguj { background: #dc3545; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; width: auto; margin: 0; }
        #btnWyloguj:hover { background: #c82333; }
        nav { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    </style>
</head>

<body>

    <nav>
        <a href="dashboard.html">Start</a>
        <a href="uslugi.html">Usługi</a>
        <b>Fryzjerzy</b>
        <a href="klienci.html">Klienci</a>
        <a href="wizyty.html">Wizyty</a>
        <div class="nav-right">
            <span id="userInfo"></span>
            <button id="btnWyloguj" onclick="wyloguj()">Wyloguj</button>
        </div>
    </nav>

    <div class="container">
        <h1>Zespół Fryzjerów</h1>

        <div class="panel-dodawania">
            <h3>Dodaj Fryzjera</h3>
            <form id="form-fryzjer">
                <label>Imię:</label>
                <input type="text" id="imie" required placeholder="np. Adam">

                <label>Nazwisko:</label>
                <input type="text" id="nazwisko" required placeholder="np. Nowak">

                <label>Telefon:</label>
                <input type="text" id="telefon" required placeholder="np. 600-700-800">

                <label>Data zatrudnienia:</label>
                <input type="date" id="dataZatrudnienia" required>

                <label>Główna Specjalizacja (wybierz z usług):</label>
                <select id="specjalizacjaSelect" required>
                    <option value="" disabled selected>-- Ładowanie usług... --</option>
                </select>

                <button type="submit">Zatrudnij Fryzjera</button>
            </form>
        </div>

        <hr>

        <h3>Lista Pracowników</h3>
        <table class="content-table">
            <thead>
                <tr>
                    <th>Imię i Nazwisko</th>
                    <th>Specjalizacja</th>
                    <th>Telefon</th>
                    <th>Zatrudniony od</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody id="tabela-fryzjerow">
            </tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        (async () => {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const info = document.getElementById('userInfo');
                if (info) info.textContent = `👤 ${data.username} (${data.rola})`;
            } catch (_) { window.location.href = '/login.html'; }
        })();
        async function wyloguj() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (_) {}
            window.location.href = '/login.html';
        }
    </script>
    <script src="js/fryzjerzy.js"></script>
</body>

</html>
