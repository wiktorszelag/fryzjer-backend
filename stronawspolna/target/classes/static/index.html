<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie – Fryzjer WS&BG</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Wymuszenie proporcji dla flexboxa */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <!-- Górna nawigacja pasek -->
    <nav>
        <b style="color: #ffc107; font-size: 20px;">⚡ Fryzjer WS&BG</b>
        <span style="color: white; margin: 0 15px; font-size: 15px;">Panel logowania</span>
    </nav>

    <div class="login-wrapper">
        <div class="login-box">

            <!-- Nagłówek -->
            <div class="login-header">
                <h1><i class="fas fa-cut" style="color:#ffc107;"></i> Fryzjer WS&amp;BG</h1>
                <p>System zarządzania salonem fryzjerskim</p>
            </div>

            <!-- Zakładki -->
            <div class="tabs-nav">
                <button class="tab-link active" id="tab-login" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i>Logowanie
                </button>
                <button class="tab-link" id="tab-register" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i>Rejestracja
                </button>
            </div>

            <!-- Panel: Logowanie -->
            <div class="tab-panel active" id="panel-login">
                <form onsubmit="handleLogin(event)">
                    <label for="login-username">Nazwa użytkownika</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login-username" placeholder="np. admin" autocomplete="username" required>
                    </div>

                    <label for="login-password">Hasło</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>

                    <button type="submit" class="btn-auth" id="btn-login">
                        <div class="spinner-sm" id="spin-login"></div>
                        <span id="btn-login-text"><i class="fas fa-sign-in-alt"></i> Zaloguj się</span>
                    </button>

                    <div class="alert alert-danger" id="err-login">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="err-login-text">Nieprawidłowe dane logowania.</span>
                    </div>
                </form>
            </div>

            <!-- Panel: Rejestracja -->
            <div class="tab-panel" id="panel-register">
                <form onsubmit="handleRegister(event)">
                    <label for="reg-username">Nazwa użytkownika</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-username" placeholder="min. 3 znaki" autocomplete="off" required>
                    </div>

                    <label for="reg-password">Hasło</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="min. 6 znaków" autocomplete="new-password" required>
                    </div>

                    <label for="reg-password2">Potwierdź hasło</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password2" placeholder="powtórz hasło" autocomplete="new-password" required>
                    </div>

                    <label for="reg-rola">Rola</label>
                    <div class="input-wrap">
                        <i class="fas fa-id-badge"></i>
                        <select id="reg-rola" onchange="toggleKodDostepu()">
                            <option value="KLIENT" selected>Klient</option>
                            <option value="PRACOWNIK">Pracownik</option>
                        </select>
                    </div>

                    <div id="kod-dostepu-group" style="display:none;">
                        <label for="reg-kod">Kod dostępu pracownika</label>
                        <div class="input-wrap">
                            <i class="fas fa-key"></i>
                            <input type="password" id="reg-kod" placeholder="wprowadź kod dostępu">
                        </div>
                    </div>

                    <button type="submit" class="btn-auth" id="btn-register">
                        <div class="spinner-sm" id="spin-register"></div>
                        <span id="btn-register-text"><i class="fas fa-user-plus"></i> Utwórz konto</span>
                    </button>

                    <div class="alert alert-danger" id="err-register">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="err-register-text">Błąd rejestracji.</span>
                    </div>
                    <div class="alert alert-success" id="ok-register">
                        <i class="fas fa-check-circle"></i>
                        <span id="ok-register-text">Konto zostało utworzone!</span>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <!-- Stopka -->
    <div class="login-footer-bar">
        &copy; 2026 <span>Fryzjer WS&amp;BG</span> &mdash; System Zarządzania Salonem
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Pokaż/ukryj pole kodu dostępu
        function toggleKodDostepu() {
            const rola = document.getElementById('reg-rola').value;
            const group = document.getElementById('kod-dostepu-group');
            group.style.display = rola === 'PRACOWNIK' ? 'block' : 'none';
            if (rola !== 'PRACOWNIK') document.getElementById('reg-kod').value = '';
        }

        // Sprawdź czy już zalogowany → przekieruj
        (async function () {
            try {
                const r = await fetch('/api/auth/me', { credentials: 'include' });
                if (r.ok) window.location.replace('dashboard.html');
            } catch (e) {}
        })();

        // ===== ZAKŁADKI =====
        function switchTab(tab) {
            const isReg = tab === 'register';
            document.getElementById('tab-login').classList.toggle('active', !isReg);
            document.getElementById('tab-register').classList.toggle('active', isReg);
            document.getElementById('panel-login').classList.toggle('active', !isReg);
            document.getElementById('panel-register').classList.toggle('active', isReg);
            ['err-login','err-register','ok-register'].forEach(id => document.getElementById(id).classList.remove('show'));
        }

        // ===== POMOCNICZE =====
        function setLoading(btnId, spinId, textId, loading) {
            document.getElementById(btnId).disabled = loading;
            document.getElementById(spinId).style.display = loading ? 'block' : 'none';
            document.getElementById(textId).style.display = loading ? 'none' : 'inline';
        }

        // ===== LOGOWANIE =====
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errDiv = document.getElementById('err-login');
            errDiv.classList.remove('show');
            setLoading('btn-login', 'spin-login', 'btn-login-text', true);
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();
                if (resp.ok) {
                    window.location.replace('dashboard.html');
                } else {
                    document.getElementById('err-login-text').textContent = data.komunikat || 'Nieprawidłowe dane logowania.';
                    errDiv.classList.add('show');
                }
            } catch (err) {
                document.getElementById('err-login-text').textContent = 'Błąd połączenia z serwerem.';
                errDiv.classList.add('show');
            } finally {
                setLoading('btn-login', 'spin-login', 'btn-login-text', false);
            }
        }

        // ===== REJESTRACJA =====
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;
            const rola = document.getElementById('reg-rola').value;
            const kod = document.getElementById('reg-kod').value;
            const errDiv = document.getElementById('err-register');
            const okDiv = document.getElementById('ok-register');
            errDiv.classList.remove('show');
            okDiv.classList.remove('show');

            if (password !== password2) {
                document.getElementById('err-register-text').textContent = 'Hasła nie są identyczne.';
                errDiv.classList.add('show');
                return;
            }

            if (rola === 'PRACOWNIK' && kod !== 'praca') {
                document.getElementById('err-register-text').textContent = 'Nieprawidłowy kod dostępu pracownika.';
                errDiv.classList.add('show');
                return;
            }

            setLoading('btn-register', 'spin-register', 'btn-register-text', true);
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password, rola, kodDostepu: kod })
                });
                const data = await resp.json();
                if (resp.status === 201 || resp.ok) {
                    document.getElementById('ok-register-text').textContent = `Konto "${username}" utworzone! Możesz się zalogować.`;
                    okDiv.classList.add('show');
                    // Auto-przełącz na logowanie po 1.8s
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-username').value = username;
                        document.getElementById('login-password').focus();
                    }, 1800);
                } else {
                    document.getElementById('err-register-text').textContent = data.komunikat || 'Błąd rejestracji.';
                    errDiv.classList.add('show');
                }
            } catch (err) {
                document.getElementById('err-register-text').textContent = 'Błąd połączenia z serwerem.';
                errDiv.classList.add('show');
            } finally {
                setLoading('btn-register', 'spin-register', 'btn-register-text', false);
            }
        }
    </script>
</body>

</html>
