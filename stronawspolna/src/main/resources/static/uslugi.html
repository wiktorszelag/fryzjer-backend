<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Usługi - Fryzjer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #userInfo { color: #adb5bd; font-size: 14px; margin: 0 15px; }
        #btnWyloguj { background: #dc3545; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; width: auto; margin: 0; }
        #btnWyloguj:hover { background: #c82333; }
        nav { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    </style>
</head>

<body>

    <nav>
        <a href="dashboard.html">Start</a>
        <b>Usługi</b>
        <a href="fryzjerzy.html">Fryzjerzy</a>
        <a href="klienci.html">Klienci</a>
        <a href="wizyty.html">Wizyty</a>
        <div class="nav-right">
            <span id="userInfo"></span>
            <button id="btnWyloguj" onclick="wyloguj()">Wyloguj</button>
        </div>
    </nav>

    <div class="container">
        <h1>Cennik Usług</h1>

        <div class="panel-dodawania">
            <h3>Dodaj nową usługę</h3>
            <form id="form-usluga">
                <label>Nazwa usługi:</label>
                <input type="text" id="nazwa" placeholder="np. Strzyżenie brody" required>

                <label>Opis:</label>
                <input type="text" id="opis" placeholder="Krótki opis...">

                <label>Cena Netto (PLN):</label>
                <input type="number" id="cenaNetto" step="0.01" required>

                <label>VAT (%):</label>
                <input type="number" id="stawkaVat" value="23" required>

                <label>Czas trwania (minuty):</label>
                <input type="number" id="czasTrwaniaMin" required>

                <button type="submit">Dodaj Usługę</button>
            </form>
        </div>

        <hr>

        <h3>Dostępne Usługi</h3>
        <table class="content-table">
            <thead>
                <tr>
                    <th>Nazwa</th>
                    <th>Opis</th>
                    <th>Cena Netto</th>
                    <th>VAT</th>
                    <th>Czas</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody id="lista-uslug">
            </tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        (async () => {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const info = document.getElementById('userInfo');
                if (info) info.textContent = `👤 ${data.username} (${data.rola})`;
            } catch (_) { window.location.href = '/login.html'; }
        })();
        async function wyloguj() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (_) {}
            window.location.href = '/login.html';
        }
    </script>
    <script src="js/uslugi.js"></script>
</body>

</html>
