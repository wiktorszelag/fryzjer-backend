name: Deploy Fryzjer (Build on Server)

on:
  push:
    branches: [ "master" ]  # Upewnij się, że Twój branch to master (czasem jest to main)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to server and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Wejdź do katalogu
            cd /home/wiktor/fryzjer-backend
            
            # 2. Pobierz najnowszy kod (to, co robiłeś ręcznie)
            git pull origin master
            
            # 3. Zbuduj i uruchom (to, co robiłeś ręcznie)
            # Używamy pełnej ścieżki do dockera, żeby uniknąć błędów
            docker-compose down
            docker-compose up -d --build
            
            # 4. Posprzątaj śmieci po budowaniu (opcjonalnie)
            docker system prune -f