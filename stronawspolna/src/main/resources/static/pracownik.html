<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Pracownika</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #aaa; }
    </style>
</head>
<body>
    <h1>Panel Pracownika</h1>
    <button onclick="logout()">Wyloguj</button>

    <div class="section">
        <h2>Osoba z ulicy (Szybka rezerwacja)</h2>
        <input type="text" id="walkInName" placeholder="Imię osoby">
        <input type="datetime-local" id="walkInTime">
        <input type="number" id="walkInDuration" placeholder="Czas (min)" value="30">
        <button onclick="addWalkIn()">Dodaj Wizytę</button>
    </div>

    <div class="section">
        <h2>Zgłoś Urlop / Niedostępność</h2>
        <input type="date" id="urlopOd" placeholder="Data Od">
        <input type="date" id="urlopDo" placeholder="Data Do">
        <button onclick="addUrlop()">Zgłoś</button>
        <ul id="urlopList"></ul>
    </div>

    <script>
        async function logout() {
            await fetch('/api/auth/logout', {method: 'POST', credentials: 'include'});
            window.location.href = '/login.html';
        }

        async function addWalkIn() {
            const imie = document.getElementById('walkInName').value;
            const czas = document.getElementById('walkInTime').value;
            const duration = document.getElementById('walkInDuration').value;

            if(!imie || !czas) return alert('Wypełnij pola');

            const payload = {
                imieKlientaZUlicy: imie,
                dataGodzinaRozpoczecia: czas,
                czasTrwaniaCalkowity: parseInt(duration)
            };

            const res = await fetch('/api/wizyty', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify(payload)
            });

            if (res.ok) alert('Dodano wizytę osoby z ulicy');
            else alert('Błąd dodawania wizyty');
        }

        async function addUrlop() {
            const od = document.getElementById('urlopOd').value;
            const doD = document.getElementById('urlopDo').value;
            if(!od || !doD) return alert('Wypełnij daty');

            // Dla uproszczenia (wymaga autoryzacji do pobrania ID fryzjera, tutaj np. fryzjerId=1 dla demonstracji)
            // Normalnie pracownik powinien być podpięty pod Fryzjer encję. Wpiszmy 1 jako mock.
            const payload = { fryzjerId: 1, dataOd: od, dataDo: doD };

            const res = await fetch('/api/urlopy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Urlop zapisany');
            } else alert('Błąd');
        }
    </script>
</body>
</html>
