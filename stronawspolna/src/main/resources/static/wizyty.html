<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Terminarz Wizyt</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #userInfo { color: #adb5bd; font-size: 14px; margin: 0 15px; }
        #btnWyloguj { background: #dc3545; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; width: auto; margin: 0; }
        #btnWyloguj:hover { background: #c82333; }
        nav { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    </style>
</head>

<body>

    <nav>
        <a href="dashboard.html">Start</a>
        <a href="uslugi.html">Usługi</a>
        <a href="fryzjerzy.html">Fryzjerzy</a>
        <a href="klienci.html">Klienci</a>
        <b>Wizyty</b>
        <div class="nav-right">
            <span id="userInfo"></span>
            <button id="btnWyloguj" onclick="wyloguj()">Wyloguj</button>
        </div>
    </nav>

    <div class="container">
        <h1>Umów Wizytę</h1>

        <div class="panel-dodawania">
            <form id="form-wizyta">

                <label>Klient:</label>
                <select id="klientSelect" required>
                    <option value="" disabled selected>-- Wybierz klienta --</option>
                </select>

                <label>Fryzjer:</label>
                <select id="fryzjerSelect" required>
                    <option value="" disabled selected>-- Wybierz fryzjera --</option>
                </select>

                <label>Usługi (możesz wybrać kilka):</label>
                <div class="multiselect-wrapper" id="uslugiWrapper">
                    <div class="select-btn">
                        <span id="btnText">Wybierz usługi...</span>
                        <span>▼</span>
                    </div>
                    <div class="list-items" id="listaUslug">
                    </div>
                </div>

                <label>Data i Godzina:</label>
                <input type="datetime-local" id="dataWizyty" required>

                <p style="margin-top: 15px;">
                    Szacowany czas: <strong id="totalCzas">0</strong> min <br>
                    Szacowany koszt: <strong id="totalCena">0</strong> PLN
                </p>

                <button type="submit">Zatwierdź Wizytę</button>
            </form>
        </div>

        <hr>

        <h3>Zaplanowane Wizyty</h3>
        <table class="content-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Klient</th>
                    <th>Fryzjer</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody id="tabelaWizyt">
            </tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        (async () => {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const info = document.getElementById('userInfo');
                if (info) info.textContent = `👤 ${data.username} (${data.rola})`;
            } catch (_) { window.location.href = '/login.html'; }
        })();
        async function wyloguj() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (_) {}
            window.location.href = '/login.html';
        }
    </script>
    <script src="js/wizyty.js"></script>
</body>

</html>
